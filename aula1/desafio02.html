<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DESAFIO 02 - JAVASCRIP</title>
    <link rel="icon" type="image/png" href="favicon.png"> 
    <meta name="description" content="Conteúdo das aulas de JS">
    <meta name="keywords" content="sites, web, frontend">
    <meta name="author" content="Lívia Santos, liviadosenai@gmail.com">
</head>

<body>
    <h1>Realizando operação com númers em js e exibindo difretamente no HTML</h1>
    <h2 id="num1"></h2>
     <h2 id="operacao"></h2>
    <h2 id="num2"></h2>
    <h2 id="resultado"></h2>

    <script> 
        let num1 = parseFloat(window.prompt("Digite o primeiro número:"));
        let num2 = parseFloat(window.prompt("Digite o segundo número:"));
        let operacao = window.prompt("Qual operação quer realizar? + ou -")
        let resultado = 0

        if(operacao == "+"){
            resultado = num1 + num2
        }else{
            resultado = num1 - num2
        }

        document.getElementById("num1").innerText = num1;
        document.getElementById("operacao").innerText = operacao;
        document.getElementById("num2").innerText = num2;
        document.getElementById("resultado").innerText = resultado;

    </script>

</body>

</html>
