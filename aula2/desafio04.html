    <div>
        <img width="100%" src="img/coraline1.jpg" alt="Imagem coraline" title="coraline1">
        
       <button onclick="trocarImagem()">Trocar imagem</button>
      
    </div>

    <script> 
        function trocarImagem(){
            const tags_img = document.getElementsByTagName('img');
            console.log("IMGS", tags_img);
            let tags_img_2 = tags_img[0];
            if(tags_img_2.title=="coraline1"){
                tags_img_2.src ="img/coraline2.webp"
                tags_img_2.title="coraline2"
            }else{
                tags_img_2.src ="img/coraline1.jpg"
                tags_img_2.title="coraline1"                
            }
            }




        

   
    </script>
