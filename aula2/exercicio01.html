<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXERCÍCIO 01 - JAVASCRIP</title>
    <link rel="icon" type="image/png" href="favicon.png"> 
    <meta name="description" content="Conteúdo das aulas de JS">

<body>
    <h1> <mark>MANIPULANDO ELEMENTOS (TAGS)</mark> MO HTML ATRAVÉZ DO JS: ALERT</h1>
    <hr>

    <div>
        <p>Eu amo meus <mark>amigos</mark></p>
        <p>Eu amo meu <mark>namorado</mark></p>
        <p>Eu amo minha <mark>família</mark></p>
        <p>Eu amo minha <mark>mãe</mark></p>
        <p>Eu amo minha <mark>mãe</mark></p>
     </div>

    <script> 
        const tags_p = document.getElementsByTagName('p');
        console.log(tags_p);
        let tags_p_1 = tags_p[0];
        tags_p_1.style.backgroundColor="purple";
        tags_p_1.style.color="white";

        let tags_p_2 = tags_p[1];
        tags_p_2.style.backgroundColor="pink";
        tags_p_2.style.color="white";

        let tags_p_3 = tags_p[2];
        tags_p_3.style.backgroundColor="blue";
        tags_p_3.style.color="white";

        let tags_p_4 = tags_p[3];
        tags_p_4.style.backgroundColor="red";
        tags_p_4.style.color="white";


        tags_p_1.style.textAlign="center"
        tags_p_1.style.fontSize="20pt"

        tags_p_2.style.textAlign="center"
        tags_p_2.style.fontSize="20pt"

        tags_p_3.style.textAlign="center"
        tags_p_3.style.fontSize="20pt"

        tags_p_4.style.textAlign="center"
        tags_p_4.style.fontSize="20pt"

        tags_p_4.innerHTML= "Eu amo meu <mark>pai</mark>"
        // muda o texto

        tags_p_4.innerText= "Eu amo minha mãe"
    </script>

   
       
    </script>

</body>

</html>
